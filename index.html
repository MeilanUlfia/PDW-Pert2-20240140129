<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas PDW3 - Hirono</title>

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            font-family: 'Quicksand', 'Comic Sans MS', sans-serif;
            background-color: #fff0f5; 
            text-align: center;
            margin: 0;
            padding: 40px;
        }

        .container {
            background-color: #ffffff;
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 25px; 
            border: 3px dashed #ffb6c1; 
            box-shadow: 0 8px 20px rgba(255, 182, 193, 0.4); 
        }

        .deskripsi-gambar {
            font-style: italic;
            font-size: 14px;
            color: #d87093; 
            margin-top: 15px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hirono and Si Kecil dinosaurus</h1>
        
        <img src="OIP.jpg" alt="Foto Hirono" width="350">
        
        <p class="deskripsi-gambar">Gambar: Figur Hirono duduk bersama dinosaurus kecil.</p>

        <p style="text-align: justify; font-weight: bold; color: #c71585; padding: 15px; background-color: #ffe4e1; border-radius: 15px; border: 2px solid #ffb6c1;">
          Hirono adalah makhluk kecil dengan wajah lelah menghadapi dunia… 
          padahal baru bangun tidur dan belum ngapa-ngapain
    </div>
</body>
</html>
